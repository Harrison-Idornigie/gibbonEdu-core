Alias /api/v1 /home/onionlake-admin/PROJECTS/GibbonEduDev/core/modules/API
Alias /api /home/onionlake-admin/PROJECTS/GibbonEduDev/core/modules/API

<Directory "/home/onionlake-admin/PROJECTS/GibbonEduDev/core/modules/API">
    Options Indexes FollowSymLinks
    AllowOverride All
    Require all granted

    RewriteEngine On
    RewriteCond %{REQUEST_FILENAME} !-f
    RewriteCond %{REQUEST_FILENAME} !-d
    RewriteRule ^ index.php [QSA,L]

    # Set CORS headers
    Header set Access-Control-Allow-Origin "*"
    Header set Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS"
    Header set Access-Control-Allow-Headers "Content-Type, Authorization"
</Directory>
